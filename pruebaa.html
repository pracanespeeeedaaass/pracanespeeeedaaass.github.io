<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CVATTV Pro - Directo</title>
  <script src="//ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
    <script>jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";</script>
    <style>
        body { margin: 0; background: ; color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player"></div>

    <script>
        // --- 1. REGISTRO DEL SERVICE WORKER (EL PROXY) ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('Proxy SW registrado correctamente'))
                .catch(err => console.error('Error en SW:', err));
        }

        // --- 2. CONFIGURACIÓN DEL PLAYER ---
        async function startPlayer() {
            // Ejemplo: Configura aquí los datos de tu canal
            // NOTA: Debes completar estos valores
            const MPD_URL = "https://cdn.cvattv.com.ar/live/c6eds/Metro/SA_Live_dash_cenc/Metro.mpd";
            const KEY_ID = "719aa3a5e270c7f69eba374ed80d7986";
            const KEY = "97ac59118cf4cf242e2c31e87cd38e1e";

            jwplayer("player").setup({
                playlist: [{
                    sources: [{
                        type: "dash",
                        file: MPD_URL,
                        drm: {
                            clearkey: {
                                keyId: KEY_ID,
                                key: KEY
                            }
                        }
                    }]
                }],
                width: "100%",
                height: "100%",
                autostart: false,
                stretching: "uniform"
            });
        }

        // Esperamos a que el Service Worker esté activo antes de cargar el video
        if (navigator.serviceWorker.controller) {
            startPlayer();
        } else {
            // Si el SW no está activo aún, recargamos una vez o esperamos
            navigator.serviceWorker.ready.then(() => {
                startPlayer();
            });
        }
    </script>
</body>
</html>
