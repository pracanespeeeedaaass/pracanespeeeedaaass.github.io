                            var lang = t.language ? t.language.toLowerCase() : '';
                            return lang.includes('es') || lang.includes('spa');
                        });
                        if (spanishTrack) {
                            shaka.selectAudioTrack(spanishTrack, false);
                        }
                    } catch (e) { console.log(e); }
                };

                // Forzado en cada evento de cambio de Shaka
                shaka.addEventListener('variantchanged', lockSpanish);
                shaka.addEventListener('trackschanged', lockSpanish);
                shaka.addEventListener('adaptation', lockSpanish);
                
                // Watchdog: Ejecución constante para bloquear cambios indeseados
                setInterval(lockSpanish, 1000);
            }
        });

        // SCRIPT: FORZAR PANTALLA COMPLETA
        function handleFullscreenRotation() {
            var isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
            
            if (isFullscreen) {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(function(error) {
                        console.log('No se pudo bloquear la orientación:', error);
                    });
                }
            } else {
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            }
        }

        document.addEventListener('fullscreenchange', handleFullscreenRotation);
        document.addEventListener('webkitfullscreenchange', handleFullscreenRotation);
        document.addEventListener('mozfullscreenchange', handleFullscreenRotation);
        document.addEventListener('MSFullscreenChange', handleFullscreenRotation);

    </script>
